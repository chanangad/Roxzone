<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Roxzone Purchase Complete</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="topbar">
    <a class="topbar__brand" href="../">ROXZONE</a>
    <nav class="topbar__nav">
      <span class="topbar__tab topbar__tab--active">Store</span>
    </nav>
  </header>

  <main class="page-shell">
    <section class="panel panel--narrow">
      <h1 class="panel__title">Payment Complete</h1>
      <p id="success-copy" class="page-copy">
        Confirming your PayPal payment with the backend. Please keep this page open for a moment.
      </p>
      <p id="success-status" class="helper-note helper-note--ok">
        Finalizing checkout...
      </p>
      <div class="action-row">
        <a class="action-link action-link--primary" href="../">Back to Home</a>
      </div>
    </section>
  </main>
  <script src="../app.js"></script>
  <script>
    const successCopy = document.getElementById("success-copy");
    const successStatus = document.getElementById("success-status");
    const paypalToken = query("token").trim();

    async function finalizePayPalCheckout() {
      if (!paypalToken) {
        successCopy.textContent = "This page works best when opened after a PayPal checkout redirect.";
        successStatus.textContent = "No PayPal order token was found in the URL.";
        successStatus.className = "helper-note helper-note--warn";
        return;
      }

      try {
        await postJson("/api/paypal/capture-order", {orderId: paypalToken});
        successCopy.innerHTML = "Your payment is confirmed. Return to the watch app and choose <strong>Refresh License</strong>.";
        successStatus.textContent = "PayPal payment captured successfully.";
        successStatus.className = "helper-note helper-note--ok";
      } catch (error) {
        successCopy.innerHTML = "We could not finalize the PayPal payment automatically yet. Return to the watch app and try <strong>Refresh License</strong> once more in a few seconds.";
        successStatus.textContent = error.message;
        successStatus.className = "helper-note helper-note--warn";
      }
    }

    finalizePayPalCheckout();
  </script>
</body>
</html>
